##LORE
status.gr-entry-mineral-1.name = 教程指南: [tan]矿物[]
status.gr-entry-mineral-1.description = [lightgrey]基尔小行星带上分布着铅、铜、石墨等基础矿物。这些矿石是玩家唯一能直接开采的矿物。
#status.gr-entry-mineral-1.details = [lightgrey] 基尔星球上分布着铅、铜、石墨等基础矿物。这些矿石是玩家唯一能直接开采的矿物。

status.gr-entry-trait-iframe.name = 教程指南: [tan]无敌帧[]
status.gr-entry-trait-iframe.description = [lightgrey]拥有无敌帧特性的单位在受到伤害时，会获得短暂无敌效果。\n该效果仅在伤害值在阈值范围内时生效。\n适用于[accent]壁垒, 烬火，城防[]
#status.gr-entry-trait-iframe.details = [lightgrey]拥有无敌帧特性的单位在受到伤害时，会获得短暂无敌效果。\n该效果仅在伤害值不过低或过高时生效。\n适用于[accent]Barracade, Ash, Fort[]

status.gr-entry-trait-enraged.name = 教程指南: [tan]激怒[]
status.gr-entry-trait-enraged.description = [lightgrey]部分单位在生命值降至一半时会被激怒。\n被激怒的单位移动速度与装填速度都会提升。\n适用于[accent]烬火，降罪[]
#status.gr-entry-trait-enraged.details

status.gr-entry-trait-shell-shock.name = 教程指南: [tan]震骇[]
status.gr-entry-trait-shell-shock.description = [lightgrey]震骇单位在受到伤害时会释放闪电。\n适用于[accent]电子，降罪[]
#status.gr-entry-trait-shell-shock.details

status.gr-entry-turret-1.name = 教程指南: [tan]炮塔[]
status.gr-entry-turret-1.description = [lightgrey]基尔小行星带上的炮塔血量更高，且弹药和建造需求较高。\n大多数炮塔仅能对空。
#status.gr-entry-turret-1.details

status.gr-lore-1.name = 数据芯片：[sky]创世纪[]
status.gr-lore-1.description = 在塞普罗星球的一段和平时期，一个名为[green]杰尼瑞安[]的派系在此定居，这标志着创世纪纪元的开端。\n杰尼瑞安是一个爱好和平的派系，直到无数次核心发射流程中的某一个命运之日。\n一枚核心受到了原生质辐射的影响，其AI核心遭到损毁。这个失控的AI核心名为[red]泰拉[]，最终坠落在陨石坑中，并在不久后彻底毁灭了杰尼瑞安，宣告着创世纪纪元的终结。
#status.gr-lore-1.details

status.gr-lore-2.name = 数据芯片：[sky]第一次灭绝[]
status.gr-lore-2.description = [sky]年份：75 - 第二代[]\n创世纪纪元终结后，塞普罗星球上涌现出更多失控核心，这一事件被称为「第一次灭绝」。\n小规模冲突持续不断，无数派系兴衰更迭。战争巅峰时期，由3大派系与若干小派系主导。\n这些派系包括：\n- [red]泰拉[]\n- [purple]玛拉[]\n- [sky]埃克斯特勒斯[]\n- [lightgrey]普罗托、塞勒斯与吉拉尔[]\n战争最终因塞普罗的资源枯竭而宣告结束。
#status.gr-lore-2.details

